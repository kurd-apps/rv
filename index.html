<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #fdfdfd; color: #111; }
        .hover-underline-animation {
            display: inline-block; position: relative;
        }
        .hover-underline-animation::after {
            content: ''; position: absolute; width: 100%; transform: scaleX(0); height: 2px;
            bottom: 0; left: 0; background-color: #111;
            transform-origin: bottom right; transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1);
        }
        .hover-underline-animation:hover::after {
            transform: scaleX(1); transform-origin: bottom left;
        }
        .project-img-wrapper { overflow: hidden; }
        .project-img-wrapper img { transition: transform 0.7s ease; }
        .project-img-wrapper:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="transition-all duration-300">

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <a href="#" id="uiLogo" class="text-2xl font-extrabold tracking-widest">LOGO.</a>
        <div class="space-x-8 text-sm font-semibold uppercase tracking-wider hidden md:block" id="navLinks">
            <a href="#home" class="hover-underline-animation mx-4" id="uiNavHome">Home</a>
            <a href="#work" class="hover-underline-animation mx-4" id="uiNavWork">Work</a>
            <a href="#contact" class="hover-underline-animation mx-4" id="uiNavContact">Contact</a>
        </div>
        <button id="langToggle" class="text-sm font-bold border-b-2 border-transparent hover:border-black pb-1 transition">
            کوردی
        </button>
    </nav>

    <section id="home" class="max-w-7xl mx-auto px-8 py-32 md:py-48 text-center md:text-left">
        <h1 id="uiHeroDesc" class="text-4xl md:text-7xl font-light leading-tight max-w-4xl text-gray-900">
            ...
        </h1>
    </section>

    <section id="work" class="max-w-7xl mx-auto px-8 py-20">
        <h2 id="uiWorkTitle" class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-12">Selected Works</h2>
        <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-20">
            </div>
    </section>

    <script>
        // *** لێرەدا لینکی Raw ی خۆت دابنێ ***
        const JSON_URL = 'https://raw.githubusercontent.com/kurd-apps/RV-portfolio/main/data.json';
        
        let currentLang = 'en';
        let siteData = null;

        async function loadData() {
            try {
                const res = await fetch(JSON_URL + '?t=' + Date.now());
                siteData = await res.json();
                renderUI();
            } catch (error) { console.error("Error loading data:", error); }
        }

        function renderUI() {
            if (!siteData) return;
            const isKu = currentLang === 'ku';
            document.documentElement.lang = isKu ? 'ku' : 'en';
            document.documentElement.dir = isKu ? 'rtl' : 'ltr';
            document.getElementById('langToggle').innerText = isKu ? 'English' : 'کوردی';

            // UI Texts
            const ui = siteData.ui;
            document.getElementById('uiLogo').innerText = ui.logo[currentLang];
            document.getElementById('uiNavHome').innerText = ui.navHome[currentLang];
            document.getElementById('uiNavWork').innerText = ui.navWork[currentLang];
            document.getElementById('uiNavContact').innerText = ui.navContact[currentLang];
            document.getElementById('uiHeroDesc').innerText = ui.heroDesc[currentLang];
            document.getElementById('uiWorkTitle').innerText = ui.workTitle[currentLang];

            // Projects
            const projectsHTML = siteData.projects.map(p => `
                <div class="group cursor-pointer">
                    <div class="project-img-wrapper mb-6 bg-gray-100 aspect-[4/3]">
                        <img src="${p.images[0] || ''}" alt="${p.title[currentLang]}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-2xl font-semibold mb-1">${p.title[currentLang]}</h3>
                            <p class="text-gray-500 text-sm">${p.category[currentLang]}</p>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('projectsGrid').innerHTML = projectsHTML;
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ku' : 'en';
            renderUI();
        });

        loadData();
    </script>
</body>
</html>
