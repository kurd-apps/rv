<!DOCTYPE html>
<html lang="ku" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #fafafa; color: #111; margin: 0; overflow-x: hidden; }
        .project-card:hover img { transform: scale(1.05); }
        .project-card img { transition: transform 0.5s ease; }
        #modalContent p { line-height: 1.8; }
        
        /* لێرەدا کێشەی کانڤاسەکەمان چارەسەر کرد بە زیادکردنی universeCanvas بۆ ئەوەی بچێتە پشتەوە */
        #particles-js, #universeCanvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .relative-z { position: relative; z-index: 10; }
        
        /* چاککردنی ئەنیمەیشنی تایپینگ بۆ ئەوەی جێگا بگرێت */
        .typing-cursor::after { content: '|'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .business-slide { opacity: 0; transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out; transform: translateY(10px); position: absolute; inset: 0; visibility: hidden; }
        .business-slide.active { opacity: 1; transform: translateY(0); z-index: 10; position: relative; visibility: visible; }
                /* CSS بۆ شاردنەوەی سکڕۆڵی سلایدەری مۆدێلەکە */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modern Slider Styles */
        .slider-slide { opacity: 0; transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out; position: absolute; inset: 0; transform: scale(1.05) translateZ(0); z-index: 0; visibility: hidden; }
        .slider-slide.active { opacity: 1; transform: scale(1) translateZ(0); z-index: 10; visibility: visible; }
        .glass-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="transition-all duration-300 antialiased relative">

    <!-- Header & Nav -->
    <header class="fixed w-full top-0 bg-[#020617]/90 backdrop-blur-md z-40 border-b border-white/10 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center relative z-50">
            <!-- Logo -->
            <!-- Logo -->
            <div id="navLogoContainer" class="h-10 w-10 md:h-12 md:w-12 bg-white rounded-full flex items-center justify-center shadow-lg shrink-0">
                <span id="logoTextFallback" class="font-black text-xl md:text-2xl tracking-tight uppercase text-[#020617]">RV.</span>
            </div>
            
            <!-- Desktop Menu -->
            <nav class="hidden md:flex gap-8 font-bold text-sm text-slate-300 items-center">
                <a href="#home" class="hover:text-sky-400 transition" id="navHome">سەرەتا</a>
                <a href="#about" class="hover:text-sky-400 transition" id="navAbout">دەربارە</a>
                <a href="#experience" class="hover:text-sky-400 transition" id="navExp">ئەزموون</a>
                <a href="#projects" class="hover:text-sky-400 transition" id="navProj">کارەکانم</a>
                <a href="#contact" class="hover:text-sky-400 transition" id="navCont">پەیوەندی</a>
            </nav>
            
            <div class="flex items-center gap-4">
                <button id="langToggle" class="text-slate-300 hover:text-white transition" title="گۆڕینی زمان"><i class="fa-solid fa-globe text-xl"></i></button>
                
                <!-- Mobile Menu Hamburger Button -->
                <button id="mobileMenuBtn" class="md:hidden text-slate-300 hover:text-white text-2xl ml-2">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Dropdown -->
        <div id="mobileMenu" class="hidden md:hidden absolute top-full left-0 w-full bg-[#020617]/95 backdrop-blur-xl border-b border-white/10 py-6 px-6 flex-col gap-6 text-center font-bold text-lg text-slate-300 shadow-2xl z-40">
            <a href="#home" class="hover:text-sky-400 transition mobile-link" id="mobHome">سەرەتا</a>
            <a href="#about" class="hover:text-sky-400 transition mobile-link" id="mobAbout">دەربارە</a>
            <a href="#experience" class="hover:text-sky-400 transition mobile-link" id="mobExp">ئەزموون</a>
            <a href="#projects" class="hover:text-sky-400 transition mobile-link" id="mobProj">کارەکانم</a>
            <a href="#contact" class="hover:text-sky-400 transition mobile-link" id="mobCont">پەیوەندی</a>
        </div>
    </header>

    <!-- سێکشنی یەکەم (Home) -->
    <section id="home" class="relative pt-32 pb-16 px-6 min-h-[85vh] flex items-center bg-[#020617] overflow-hidden">
        <canvas id="universeCanvas"></canvas>
        <div class="max-w-7xl mx-auto flex flex-col-reverse md:flex-row items-center gap-12 relative-z w-full">
            <div class="flex-1 text-center md:text-start mt-6 md:mt-0">
                <h1 id="heroName" class="text-4xl md:text-6xl lg:text-7xl font-black mb-4 text-white tracking-tight leading-tight min-h-[50px] md:min-h-[80px]">...</h1>
                <h2 id="heroTitle" class="text-xl md:text-2xl font-bold text-sky-400 mb-6 bg-white/5 inline-block px-5 py-2 rounded-xl backdrop-blur-sm border border-white/10 shadow-lg">...</h2>
                <p id="heroSub" class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto md:mx-0 bg-white/5 p-2 rounded backdrop-blur-sm hidden">...</p>
                <div id="heroSocials" class="flex justify-center md:justify-start gap-5 mt-4 text-3xl text-slate-300"></div>
            </div>
            <div class="w-64 h-64 md:w-[400px] md:h-[400px] shrink-0 relative mx-auto group">
                <div class="absolute -inset-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full blur-xl opacity-30 group-hover:opacity-50 transition duration-1000"></div>
               <img id="heroImage" src="" class="w-full h-full object-cover rounded-full shadow-2xl relative z-10 border-4 border-[#020617] bg-slate-900 pointer-events-none select-none" style="object-position: center;" draggable="false" oncontextmenu="return false;" onerror="this.src='https://via.placeholder.com/400x400?text=Profile+Image'">
            </div>
        </div>
    </section>

    <!-- About & Business -->
    <section id="about" class="py-20 bg-white px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <div>
                <h3 id="aboutTitle" class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-6 border-b pb-2">About Me</h3>
                <p id="aboutDesc" class="text-lg md:text-xl text-gray-700 leading-relaxed text-justify">...</p>
            </div>
            
            <div class="bg-indigo-50 p-8 md:p-10 rounded-[2rem] border border-indigo-100 shadow-sm relative overflow-hidden min-h-[350px] flex items-center">
                <div class="absolute -right-10 -top-10 text-indigo-100 opacity-50"><i class="fa-solid fa-layer-group text-9xl"></i></div>
                <div id="businessSliderContainer" class="w-full relative z-10"></div>
            </div>
        </div>
    </section>

    <!-- Experience & Skills -->
    <section id="experience" class="py-24 px-6 bg-gray-50">
        <div class="max-w-4xl mx-auto flex flex-col gap-16">
            <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-gray-100">
                <h3 id="cvTitle" class="text-2xl font-black mb-10 border-b pb-4 text-indigo-600 text-center">Experience</h3>
                <div id="cvList" class="space-y-10 border-r-2 border-indigo-100 pr-6 mr-2"></div>
            </div>
            <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-gray-100">
                <h3 id="skillsTitle" class="text-2xl font-black mb-10 border-b pb-4 text-indigo-600 text-center">Expertise</h3>
                <div id="skillsList" class="space-y-6 text-sm font-bold"></div>
            </div>
        </div>
    </section>

    <section id="projects" class="py-24 px-6 max-w-7xl mx-auto">
        <h3 id="projectsTitle" class="text-3xl font-black mb-16 border-b pb-4 text-center text-gray-900">Selected Works</h3>
        <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-16"></div>
        <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <section class="py-16 px-6 max-w-7xl mx-auto text-center border-t border-gray-200">
        <h3 id="clientsTitle" class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-12">Partners & Clients</h3>
        <div id="clientsGrid" class="flex flex-wrap justify-center items-center gap-12 md:gap-20 opacity-70 hover:opacity-100 transition duration-500"></div>
    </section>

    <section id="contact" class="pt-24 pb-12 bg-gray-900 text-white px-6 rounded-t-[3rem]">
        <div class="max-w-6xl mx-auto">
            <h2 id="contactTitle" class="text-4xl md:text-5xl font-black mb-16 text-center text-white">Let's Work Together</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-16">
                
                <!-- Contact Info Boxes -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 text-lg font-bold" id="contactInfoContainer"></div>

                <div class="bg-gray-800 p-8 rounded-3xl shadow-xl">
                    <form action="https://api.web3forms.com/submit" method="POST" id="contactForm" class="space-y-6 text-right" dir="auto">
                        <input type="hidden" name="access_key" id="formAccessKey" value="">
                        <input type="hidden" name="subject" value="نامەی نوێ لە پۆرتفۆلیۆوە">
                        <div><label class="block text-sm text-gray-400 mb-2" id="lblFormName">ناو</label><input type="text" name="name" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-indigo-500"></div>
                        <div><label class="block text-sm text-gray-400 mb-2" id="lblFormEmail">ئیمەیڵ</label><input type="email" name="email" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-indigo-500" dir="ltr"></div>
                        <div><label class="block text-sm text-gray-400 mb-2" id="lblFormMsg">نامەکەت</label><textarea name="message" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-indigo-500 h-32"></textarea></div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition" id="btnSubmitForm">ناردنی نامە</button>
                    </form>
                </div>
            </div>
            
            <div class="border-t border-gray-800 pt-8 text-center text-sm text-gray-500">
                &copy; <span id="currentYear"></span> <span id="footerName"></span>. <span id="rightsText">All rights reserved.</span>
            </div>
        </div>
    </section>

    <!-- Scroll to Top Button -->
    <button id="scrollToTopBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-40 bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-full shadow-2xl flex items-center justify-center text-xl opacity-0 translate-y-10 transition-all duration-300 pointer-events-none">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Project Modal -->
    <!-- <div id="projectModal" class="fixed inset-0 z-50 bg-white overflow-y-auto hidden opacity-0 transition-opacity duration-300">
        <button onclick="closeProject()" class="fixed top-6 right-6 z-50 bg-gray-900 text-white w-12 h-12 rounded-full font-bold text-xl hover:scale-110 transition shadow-lg flex items-center justify-center">✕</button>
        <div class="max-w-5xl mx-auto py-20 px-6" id="modalContent"></div>
    </div> -->
    <!-- Project Detail Page View (Hidden by default) -->
    <section id="projectDetailView" class="hidden bg-[#fafafa] min-h-screen relative z-30"></section>

    <script>
        const JSON_URL = 'https://raw.githubusercontent.com/kurd-apps/RV/main/data.json';
        let currentLang = 'ku';
        let siteData = null;
        let businessSlideIndex = 0;
        let businessSlideInterval;
        let typingTimeout; // گۆڕاوی تایبەت بە لۆپی تایپینگەکە
        let modernSliderInterval; // بۆ کۆنترۆڵکردنی سلایدەرە مۆدێرنەکە
        let modernSlideIndex = 0;
        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            mobileMenu.classList.toggle('flex');
            const icon = mobileMenuBtn.querySelector('i');
            if(mobileMenu.classList.contains('hidden')) { icon.className = 'fa-solid fa-bars'; } 
            else { icon.className = 'fa-solid fa-xmark'; }
        });
        document.querySelectorAll('.mobile-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                mobileMenu.classList.remove('flex');
                mobileMenuBtn.querySelector('i').className = 'fa-solid fa-bars';
            });
        });

        // Scroll to top logic
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollToTopBtn');
            if(window.scrollY > 400) {
                btn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                btn.classList.add('opacity-100', 'translate-y-0');
            } else {
                btn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                btn.classList.remove('opacity-100', 'translate-y-0');
            }
        });

        // Universe Canvas Logic
        let canvas, ctx, w, h; const stars =[];
        function initUniverse() {
            canvas = document.getElementById('universeCanvas'); if(!canvas) return;
            ctx = canvas.getContext('2d'); w = canvas.width = window.innerWidth; h = canvas.height = canvas.parentElement.offsetHeight; 
            stars.length = 0;
            for (let i = 0; i < 300; i++) { stars.push({ x: Math.random() * w, y: Math.random() * h, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.1, opacity: Math.random(), color: Math.random() > 0.8 ? '#a5f3fc' : '#ffffff' }); }
            drawUniverse();
        }
        function drawUniverse() {
            if(!ctx) return;
            ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, w, h);
            stars.forEach(star => {
                ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fillStyle = star.color; ctx.globalAlpha = star.opacity; ctx.fill();
                star.y -= star.speed; if (star.y < 0) { star.y = h; star.x = Math.random() * w; }
                star.opacity += (Math.random() - 0.5) * 0.05; if (star.opacity < 0.1) star.opacity = 0.1; if (star.opacity > 1) star.opacity = 1;
            });
            const gradient = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w * 0.6);
            gradient.addColorStop(0, 'rgba(30, 58, 138, 0.2)'); gradient.addColorStop(0.5, 'rgba(88, 28, 135, 0.1)'); gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient; ctx.globalAlpha = 1; ctx.fillRect(0, 0, w, h);
            requestAnimationFrame(drawUniverse);
        }
        window.addEventListener('resize', initUniverse);

        function getFullImageUrl(url) { if (!url) return ''; if (url.startsWith('http')) return url; return `https://raw.githubusercontent.com/kurd-apps/RV/main/${url}`; }

        // لێرەدا فەنکشنی ناسینەوەی ڤیدیۆکانمان بەهێزتر کرد بۆ ناسینەوەی YouTube Shorts
        function getEmbedUrl(url) {
            if(!url) return '';
            let embed = url;
            if(url.includes('youtu.be/')) {
                embed = 'https://www.youtube.com/embed/' + url.split('youtu.be/')[1].split('?')[0];
            } else if(url.includes('youtube.com/watch?v=')) {
                embed = 'https://www.youtube.com/embed/' + url.split('v=')[1].split('&')[0];
            } else if(url.includes('youtube.com/shorts/')) {
                // ئەم دێڕە کێشەی نەخوێندنەوەی ڤیدیۆی Shorts چارەسەر دەکات
                embed = 'https://www.youtube.com/embed/' + url.split('shorts/')[1].split('?')[0];
            } else if(url.includes('facebook.com') && url.includes('/videos/')) {
                embed = 'https://www.facebook.com/plugins/video.php?href=' + encodeURIComponent(url) + '&show_text=0&width=auto';
            } else if(url.includes('vimeo.com/')) {
                embed = 'https://player.vimeo.com/video/' + url.split('vimeo.com/')[1];
            }
            return embed;
        }

        // فەنکشنی تایپینگی لۆپ (نوسین و سڕینەوە بە بەردەوامی)
        function typeWriter(elementId, text, i = 0, isDeleting = false) {
            const el = document.getElementById(elementId);
            if (!el) return;

            clearTimeout(typingTimeout); // وەستاندنی هەر نوسینێکی پێشوو

            if (!isDeleting) {
                el.innerText = text.substring(0, i + 1);
                i++;
                if (i === text.length) {
                    typingTimeout = setTimeout(() => typeWriter(elementId, text, i, true), 2500);
                } else {
                    typingTimeout = setTimeout(() => typeWriter(elementId, text, i, false), 100);
                }
            } else {
                el.innerText = text.substring(0, i - 1);
                i--;
                if (i === 0) {
                    typingTimeout = setTimeout(() => typeWriter(elementId, text, i, false), 500);
                } else {
                    typingTimeout = setTimeout(() => typeWriter(elementId, text, i, true), 50);
                }
            }
        }

        async function loadData() {
            try {
                const res = await fetch(JSON_URL + '?t=' + Date.now()); siteData = await res.json();
                renderUI(); initUniverse(); animateStats();
            } catch (error) { console.error("Error loading data:", error); }
        }

        function startBusinessSlider() {
            clearInterval(businessSlideInterval);
            const slides = document.querySelectorAll('.business-slide');
            if(slides.length <= 1) return;
            businessSlideInterval = setInterval(() => {
                slides.forEach(s => s.classList.remove('active'));
                businessSlideIndex = (businessSlideIndex + 1) % slides.length;
                slides[businessSlideIndex].classList.add('active');
            }, 6000);
        }

        function renderUI() {
            if (!siteData) return;
            const isKu = currentLang === 'ku';
            document.documentElement.lang = isKu ? 'ku' : 'en';
            document.documentElement.dir = isKu ? 'rtl' : 'ltr';
            
            // Translations for Nav Desktop and Mobile
            document.getElementById('navHome').innerText = isKu ? 'سەرەتا' : 'Home';
            document.getElementById('mobHome').innerText = isKu ? 'سەرەتا' : 'Home';
            
            document.getElementById('navAbout').innerText = isKu ? 'دەربارە' : 'About';
            document.getElementById('mobAbout').innerText = isKu ? 'دەربارە' : 'About';
            
            document.getElementById('navExp').innerText = isKu ? 'ئەزموون و شارەزایی' : 'Experience & Skills';
            document.getElementById('mobExp').innerText = isKu ? 'ئەزموون و شارەزایی' : 'Experience & Skills';
            
            document.getElementById('navProj').innerText = isKu ? 'کارەکانم' : 'Works';
            document.getElementById('mobProj').innerText = isKu ? 'کارەکانم' : 'Works';
            
            document.getElementById('navCont').innerText = isKu ? 'پەیوەندی' : 'Contact';
            document.getElementById('mobCont').innerText = isKu ? 'پەیوەندی' : 'Contact';
            
            document.getElementById('lblFormName').innerText = isKu ? 'ناوت' : 'Your Name';
            document.getElementById('lblFormEmail').innerText = isKu ? 'ئیمەیڵەکەت' : 'Your Email';
            document.getElementById('lblFormMsg').innerText = isKu ? 'نامەکەت' : 'Your Message';
            document.getElementById('btnSubmitForm').innerText = isKu ? 'ناردنی نامە' : 'Send Message';
            document.getElementById('cvList').className = isKu ? 'space-y-10 border-r-2 border-indigo-100 pr-6 mr-2' : 'space-y-10 border-l-2 border-indigo-100 pl-6 ml-2';

            const sec = siteData.sections;
            
            // پاراستن لە Crash ئەگەر داتا نەبوو
            const heroData = sec.hero || {}; 

            // Logo in Nav
            const navLogoDiv = document.getElementById('navLogoContainer');
            if(heroData.navLogo) {
                navLogoDiv.innerHTML = `<img src="${getFullImageUrl(heroData.navLogo)}" class="h-full w-full object-cover rounded-full">`;
            } else {
                const fallbackName = (heroData.name && heroData.name[currentLang]) ? heroData.name[currentLang] : 'RV.';
                navLogoDiv.innerHTML = `<span class="font-black text-xl md:text-2xl tracking-tight uppercase text-[#020617]">${fallbackName}</span>`;
            }

            // Hero Section text logic لەگەڵ لۆپی نوسین و سڕینەوە
            const heroNameText = heroData.name ? heroData.name[currentLang] : '';
            const welcomeText = isKu ? `بەخێربێن، من ${heroNameText}م` : `Welcome, I am ${heroNameText}`;
            
            document.getElementById('heroName').innerText = ''; 
            document.getElementById('heroName').classList.add('typing-cursor');
            typeWriter('heroName', welcomeText);

            document.getElementById('heroTitle').innerText = heroData.title ? heroData.title[currentLang] : '';
            
            const heroImg = document.getElementById('heroImage');
            if(heroImg && heroData.image) {
                // Fetching image and converting to Base64 to hide the real URL (Encryption trick)
                fetch(getFullImageUrl(heroData.image))
                    .then(res => res.blob())
                    .then(blob => {
                        const reader = new FileReader();
                        reader.onloadend = () => { heroImg.src = reader.result; };
                        reader.readAsDataURL(blob);
                    })
                    .catch(() => { heroImg.src = getFullImageUrl(heroData.image); });
                
                if(heroData.imagePos && heroData.imagePos.x) {
                    heroImg.style.objectPosition = `${heroData.imagePos.x}% ${heroData.imagePos.y}%`;
                }
            }

            document.getElementById('aboutTitle').innerText = sec.about.heading[currentLang];
            document.getElementById('aboutDesc').innerText = sec.about.desc[currentLang];
            
            // Business Slider Rendering
            const bContainer = document.getElementById('businessSliderContainer');
            if(sec.businesses && sec.businesses.length > 0) {
                bContainer.innerHTML = sec.businesses.map((b, i) => {
                    let bSocials = '';
                    if(b.socials) {
                        if(b.socials.website) bSocials += `<a href="${b.socials.website}" target="_blank" class="text-indigo-400 hover:text-indigo-600 transition"><i class="fa-solid fa-link"></i></a>`;
                        if(b.socials.facebook) bSocials += `<a href="${b.socials.facebook}" target="_blank" class="text-indigo-400 hover:text-indigo-600 transition"><i class="fa-brands fa-facebook"></i></a>`;

                if(idx !== index) {
                    slide.classList.remove('active');
                    if(iframe) { const src = iframe.src; iframe.src = src; } // Reset iframe to stop video
                } else {
                    slide.classList.add('active');
                    if(ambientBg) { ambientBg.style.backgroundImage = `url('${slide.getAttribute('data-bg')}')`; }
                }
            });

            thumbs.forEach((btn, idx) => {
                if(idx === index) {
                    btn.classList.add('border-sky-500', 'shadow-[0_0_20px_rgba(14,165,233,0.4)]', 'scale-105');
                    btn.classList.remove('border-transparent', 'opacity-50');
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    btn.classList.remove('border-sky-500', 'shadow-[0_0_20px_rgba(14,165,233,0.4)]', 'scale-105');
                    btn.classList.add('border-transparent', 'opacity-50');
                }
            });

            startModernSlider(slides.length);
        }

        function startModernSlider(count) {
            clearInterval(modernSliderInterval);
            modernSliderInterval = setInterval(() => { slideModernProject(1); }, 6000);
        }
        document.getElementById('langToggle').addEventListener('click', () => { currentLang = currentLang === 'en' ? 'ku' : 'en'; renderUI(); });
        loadData();
    </script>
</body>
</html>
